name: CI
on: [push, pull_request]

# Cancel in-progress runs for same workflow on same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test

      - name: Build package
        run: bun run build

      - name: Verify build output
        run: |
          test -f build/main.mjs || { echo "Error: build/main.mjs not found"; exit 1; }
          test -f build/main.d.mts || { echo "Error: build/main.d.mts not found"; exit 1; }
